services:
  web:
    build:
      context: .
    container_name: smt_web_prod
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file:
      - .env.prod
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - redis
      - mqtt
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smt_redis_prod
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: smt_mqtt_prod
    volumes:
      - ./docker/mosquitto/config/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/config/passwords:/mosquitto/config/passwords:ro
      - ./docker/mosquitto/config/acl:/mosquitto/config/acl:ro
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    expose:
      - "1883"
    restart: unless-stopped

  # Long-running simulator emitter. Runs ``run_simulator`` in
  # ``--duration-seconds`` mode wrapped in a Bash retry loop so the
  # process self-heals after database / broker hiccups. The runner
  # honors ``SimulatorScenario.is_active`` between cycles, so the
  # ``Sākt``/``Apturēt`` buttons on the dashboard pause/resume
  # emission live without a container restart. Disable this service
  # in environments where the simulator must never run (production
  # with real devices) by overriding ``SMT_SIMULATOR_SCENARIO`` or
  # commenting the block below.
  simulator:
    build:
      context: .
    container_name: smt_simulator_prod
    command:
      - bash
      - -c
      - "while true; do python manage.py run_simulator --scenario default_demo --duration-seconds 86400 --sleep-seconds 5 || sleep 5; done"
    env_file:
      - .env.prod
    depends_on:
      - redis
      - mqtt
      - web
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: smt_nginx_prod
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
  media_volume: