services:
  web:
    build:
      context: .
    container_name: smt_web_local
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.local
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
      - mqtt

  redis:
    image: redis:7-alpine
    container_name: smt_redis_local
    ports:
      - "127.0.0.1:6379:6379"

  mqtt:
    image: eclipse-mosquitto:2
    container_name: smt_mqtt_local
    volumes:
      - ./docker/mosquitto/config/mosquitto.local.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/config/passwords:/mosquitto/config/passwords:ro
      - ./docker/mosquitto/config/acl:/mosquitto/config/acl:ro
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    ports:
      - "127.0.0.1:1883:1883"

  # Long-running simulator emitter for the /dashboard/simulator/
  # workspace. The actual cycle cadence is governed by the simulator
  # scenario's ``interval_seconds`` and the ``Sākt``/``Apturēt`` buttons
  # only flip ``is_active`` — this service inspects that flag every
  # cycle, so toggling Sākt/Apturēt in the UI pauses or resumes
  # emission live without restarting the container. ``--sleep-seconds 5``
  # gives the duration loop a 5 s tick; the runner will emit on every
  # tick where ``is_active=True`` and silently skip ticks where it is
  # ``False``. We use ``--duration-seconds`` (max int32) plus a Bash
  # outer loop so the service self-heals after process exit / DB drops.
  simulator:
    build:
      context: .
    container_name: smt_simulator_local
    command:
      - bash
      - -c
      - "while true; do python manage.py run_simulator --scenario default_demo --duration-seconds 86400 --sleep-seconds 5 || sleep 5; done"
    env_file:
      - .env.local
    volumes:
      - .:/app
    depends_on:
      - redis
      - mqtt
      - web

volumes:
  smt_pgdata_local: